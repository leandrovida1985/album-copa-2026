<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Copa 2026 — Controle de Figurinhas</title>
<style>
:root{--bg:#070710;--bg2:#0a0f1a;--bg3:#0d1a30;--border:#1e293b;--border2:#0f1729;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--gold:#c9a227;--gold2:#f5e07a;--blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--red:#f87171;--red2:#e5383b;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
header{background:linear-gradient(135deg,#0a0a1f,#0f1a3a,#0a0a1f);border-bottom:1px solid #0f1f3a;padding:16px}
.hi{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.badge{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;font-weight:700}
h1.ttl{font-size:18px;font-weight:800;color:#f1f5f9}
.sub{font-size:11px;color:var(--text3);margin-top:2px}
.tbox{text-align:right}
.tnum{font-size:26px;font-weight:900;color:var(--blue2)}
.tof{font-size:13px;color:#1e3a5f}
.tlbl{font-size:10px;color:var(--text3)}
.bbar{width:160px;height:6px;background:#0f1a2e;border-radius:3px;overflow:hidden;margin-top:4px;margin-left:auto}
.bbar-f{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:3px;transition:width .5s}
.tpct{font-size:10px;color:var(--blue);margin-top:2px}
.save-pill{font-size:9px;color:#60a5fa;opacity:0;transition:opacity .4s;margin-top:4px;letter-spacing:.5px}
nav{display:flex;gap:3px;padding:8px 14px;background:#07070f;border-bottom:1px solid #0f1729;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.tab{padding:7px 13px;border-radius:7px;border:1px solid #0f1729;background:transparent;color:var(--text3);font-size:12px;font-weight:500}
.tab.on{background:#0f1f3a;color:var(--blue2);border-color:#1d4ed8}
main{max-width:960px;margin:0 auto;padding:16px 13px}
.sec{display:none}.sec.on{display:block}
.cr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:12px;text-align:center}
.cv{font-size:22px;font-weight:800}.cl{font-size:10px;color:var(--text3);margin-top:2px}.cs{font-size:11px;font-weight:600;margin-top:2px}
.tc{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid #1a3a5a;border-radius:13px;padding:14px 18px;margin-bottom:18px}
.ti{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.tbig{font-size:30px;font-weight:900;color:var(--blue2);line-height:1}
.bar{height:9px;background:#0a1628;border-radius:4px;overflow:hidden;border:1px solid #1a3a5a;flex:1}
.barf{height:100%;background:linear-gradient(90deg,#1d4ed8,#7c3aed,var(--gold));border-radius:4px;transition:width .6s}
.aot{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.blk{margin-bottom:14px}
.bh{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.btag{font-size:8px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.bttl{flex:1;font-size:11px;font-weight:600;color:var(--text3)}
.bcnt{font-size:12px;font-weight:800}
.pr{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:9px;padding:3px 7px;border-radius:5px;background:var(--bg2);border:1px solid var(--border);color:#334155}
.pill.on{background:#0f2010;border-color:#22c55e55;color:#4ade80}
.pill.gon{background:#1a1200;border-color:var(--gold);color:var(--gold)}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.gc{background:var(--bg2);border:1px solid;border-radius:11px;padding:11px}
.gbdg{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.nr{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.nb{height:3px;background:#0f1729;border-radius:2px;overflow:hidden;margin-top:2px;flex:1}
.nbf{height:100%;border-radius:2px;transition:width .3s}
.gbw{height:3px;background:#0f1729;border-radius:2px;overflow:hidden;margin-top:8px}
.gbf{height:100%;border-radius:2px}
.ab{display:flex;gap:10px;align-items:center;background:var(--bg2);border:1px solid #1d4ed8;border-radius:9px;padding:9px 13px;color:#93c5fd;font-size:12px;margin-top:8px}
.fwcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px;margin-bottom:8px}
.fc{position:relative;background:linear-gradient(145deg,#0d1e3a,#0a1628);border:1px solid #1a3a6a44;border-radius:11px;padding:22px 10px 10px;text-align:center;cursor:pointer;transition:all .2s}
.fc.on{background:linear-gradient(145deg,#0f2010,#0a180a);border-color:var(--gold);box-shadow:0 0 12px #c9a22720}
.fn{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;color:#5a7ab0}
.ff{position:absolute;top:6px;right:6px;font-size:9px;color:var(--gold)}
.fi{font-size:22px;margin-bottom:4px}
.fnam{font-size:10px;font-weight:700;color:#94a3b8;line-height:1.3}
.fc.on .fnam{color:#e8d48b}
.fsub{font-size:9px;color:#3d5a7a;margin:3px 0 6px}
.rr{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:4px}
.rb{background:#0a1628;border:1px solid #1a3a5a;color:#3d5a7a;border-radius:3px;width:16px;height:16px;font-size:10px;line-height:1;padding:0}
.rl{font-size:9px;min-width:22px;text-align:center;color:#334155}
.rl.h{color:var(--gold)}
.tb{border:1px solid #1a3a5a;background:transparent;color:#3d5a7a;border-radius:7px;padding:4px 10px;font-size:10px;font-weight:600;width:100%;margin-bottom:4px}
.tb.on{background:linear-gradient(135deg,var(--gold),#8b6914);color:#000;border-color:var(--gold);box-shadow:0 2px 7px #c9a22744}
.si{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:8px 13px;color:var(--text);font-size:12px;margin-bottom:14px;outline:none}
.gtt{display:flex;align-items:center;gap:10px;padding-bottom:8px;margin-bottom:10px;border-bottom:1px solid}
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:9px}
.nc{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px;cursor:pointer;text-align:center}
.na{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:1px}
.nn{font-size:10px;color:#cbd5e1;font-weight:500;margin-bottom:2px}
.ngrp{font-size:9px;font-weight:600;margin-bottom:5px}
.nbar{height:3px;background:#0f1729;border-radius:2px;overflow:hidden;margin-bottom:5px}
.nbarf{height:100%;border-radius:2px;transition:width .3s}
.nm{display:flex;justify-content:center;gap:8px;font-size:11px}
.bk{background:#0f1729;border:none;color:#64748b;padding:6px 13px;border-radius:7px;font-size:12px;margin-bottom:13px}
.nvb{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.nvbt{background:#0f1729;border:1px solid var(--border);color:#94a3b8;padding:6px 12px;border-radius:7px;font-size:12px;display:flex;align-items:center;gap:4px}
.nvbt:disabled{opacity:.3;cursor:default}
.nh{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;background:var(--bg2);padding:13px;border-radius:11px;border:1px solid}
.mb{width:200px;height:5px;background:#0f1729;border-radius:3px;overflow:hidden;margin-top:4px}
.mbf{height:100%;border-radius:3px;transition:width .3s}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:6px;margin-bottom:16px}
.sc{border-radius:9px;padding:7px 5px;text-align:center;border:2px solid var(--border);background:#0a0a18}
.sc.on{background:#0f1a10}.sc.sh{background:#0d200a}.sc.ph{background:#0a1220}
.sp{font-size:9px;color:var(--text3);margin-bottom:2px}
.sbt{background:none;border:none;font-size:13px;display:block;width:100%;color:#334155;padding:0}
.slbl{font-size:8px;color:#334155;margin-bottom:3px}
.mbox{background:var(--bg2);border:1px solid #1d4ed822;border-radius:9px;padding:10px 13px;font-size:11px;line-height:1.9;margin-bottom:8px}
.hb{position:relative;overflow:hidden;background:linear-gradient(160deg,#0a1628,#0d2250,#0a1628);border:1px solid #1a3a6a;border-radius:14px;padding:22px 18px 16px;margin-bottom:20px;text-align:center}
.hg{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:280px;height:100px;border-radius:50%;background:radial-gradient(ellipse,#c9a22744,transparent 70%);pointer-events:none}
.hst{font-size:9px;color:#c9a22766;letter-spacing:3px;margin-bottom:6px}
.httl{font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(180deg,#f5e07a,var(--gold),#8b6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px}
.hsub{font-size:11px;color:#5a7ab0;letter-spacing:1px;margin-bottom:12px}
.hpr{display:flex;align-items:center;gap:8px;justify-content:center}
.hpb{width:180px;height:5px;background:#0a1628;border-radius:3px;overflow:hidden;border:1px solid #1a3a6a}
.hpbf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .5s}
.hpl{font-size:11px;color:var(--gold);font-weight:700}
.ch{display:flex;align-items:center;gap:10px;margin:0 0 13px}
.cl2{flex:1;height:1px;background:linear-gradient(90deg,transparent,#c9a22755,transparent)}
.clbl{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.ic{position:relative;overflow:hidden;background:linear-gradient(155deg,#0d1e3a,#0a1628);border:1px solid #1a3a6a44;border-radius:13px;padding:22px 12px 12px;text-align:center;max-width:180px;margin:0 auto 24px}
.ic.on{background:linear-gradient(155deg,#0f2010,#0a180a);border-color:var(--gold);box-shadow:0 0 16px #c9a22722}
.ic00{border-color:#f59e0b33;background:#100e00}.ic00.on{background:#1a1200;border-color:#f59e0b99}
.ii{font-size:28px;margin-bottom:7px}.in{font-size:11px;font-weight:700;color:#e8d48b;margin-bottom:2px}.isub{font-size:9px;color:#3d5a7a;margin-bottom:9px}
.b00{position:absolute;top:6px;right:6px;font-size:10px;font-weight:900;color:#f59e0b;background:#f59e0b22;padding:1px 5px;border-radius:4px}
.hdr{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:9px;border:1px solid;margin-bottom:9px}
.hdrnm{flex:1;font-size:11px;font-weight:800;letter-spacing:2px;color:#e8d48b}
.stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;margin-bottom:4px}
.stc{position:relative;overflow:hidden;background:linear-gradient(145deg,#0b1525,#081020);border:1px solid #1a2e4a44;border-radius:10px;padding:10px 9px 9px;text-align:center}
.stc.on{background:linear-gradient(145deg,#0d2510,#081a0a)}
.stcy{font-size:12px;margin-bottom:4px}.stnm{font-size:10px;font-weight:700;color:#94a3b8;line-height:1.2;margin-bottom:2px}
.stc.on .stnm{color:#c8d8f0}
.stct{font-size:9px;color:#3d5a7a;margin-bottom:3px}
.stnt{font-size:8px;color:var(--gold);font-weight:700;background:#c9a22715;border-radius:3px;padding:1px 5px;margin-bottom:4px;display:inline-block}
.stbt{border:1px solid #1a3a5a;background:transparent;color:#3d5a7a;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;width:100%;margin-bottom:4px}
.ccg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.ccc{position:relative;overflow:hidden;background:linear-gradient(145deg,#0b1525,#081020);border:1px solid #1a2e4a44;border-radius:10px;padding:10px 9px 9px;text-align:center}
.ccc.on{background:linear-gradient(145deg,#1a0505,#100303);border-color:#e5383b99}
.ccn{font-size:9px;color:var(--red2);font-weight:800;margin-bottom:2px;letter-spacing:1px}
.ccf{font-size:16px;margin-bottom:3px}.ccnm{font-size:10px;font-weight:700;color:#c8d8f0;line-height:1.2;margin-bottom:1px}
.ccc.on .ccnm{color:#fca5a5}
.ccsl{font-size:9px;color:#3d5a7a;margin-bottom:5px}
.ccbt{border:1px solid #1a3a5a;background:transparent;color:#3d5a7a;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:600;width:100%;margin-bottom:4px}
.ccc.on .ccbt{background:var(--red2);color:#fff;border-color:var(--red2)}
.trs{display:flex;align-items:center;justify-content:space-around;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid #1a3a5a;border-radius:13px;padding:12px 10px;margin-bottom:14px}
.trsi{text-align:center;flex:1}.trsn{font-size:20px;font-weight:900;line-height:1}.trsl{font-size:10px;color:var(--text3);margin-top:3px}
.trsd{width:1px;height:30px;background:var(--border)}
.trst{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.trstb{flex:1;min-width:90px;padding:9px 10px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);color:#64748b;font-size:11px;font-weight:600}
.trstb.on{background:#0f1f3a;color:var(--blue2);border-color:#1d4ed8}
.trsr{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:12px;margin-bottom:10px;outline:none}
.trch{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.trchp{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:#64748b;font-size:11px;font-weight:600}
.trlh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.trcpy{background:#0f2010;border:1px solid #22c55e55;color:#4ade80;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600}
.trgl{font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;letter-spacing:.5px}
.trig{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:12px}
.tri{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid}
.tri span{font-size:12px;font-weight:600;color:#cbd5e1;flex:1}
.trbdg{background:#14532d;color:#86efac;border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700}
.trsp{font-size:9px;color:var(--gold)}
.es{color:#334155;font-size:12px;padding:14px;text-align:center}
.trmi{background:var(--bg2);border:1px solid #c9a22733;border-radius:11px;padding:12px 14px;font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:12px}
.trta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:12px;margin-bottom:14px;outline:none;resize:vertical}
.trmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:12px}
.trmc{display:flex;align-items:center;gap:6px;padding:9px 11px;border-radius:9px;border:2px solid}
.trbcp{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--gold),#8b6914);border:none;color:#000;padding:12px;border-radius:10px;font-size:14px;font-weight:700}
/* ── PRINT TAB ──────────────────────────────── */
.pg-topbar{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 16px;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.pg-pbtn{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;color:#fff;padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
/* compact grid — tela */
#pt-wrap{background:#fff;color:#111;border-radius:11px;padding:12px;border:2px solid #e5e7eb}
#pt-legend{display:flex;gap:12px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.pt-litem{display:flex;align-items:center;gap:4px;font-size:9px;color:#555}
.pt-gh{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;margin:3px 0 2px;letter-spacing:1px;display:inline-block}
.pt-row{display:flex;align-items:center;gap:1px;margin-bottom:1px;height:14px}
.pt-fl{font-size:11px;width:16px;flex-shrink:0;text-align:center;line-height:14px}
.pt-cd{font-size:7px;font-weight:800;width:24px;flex-shrink:0;color:#333;line-height:14px}
.pt-bx{flex:1;height:12px;font-size:6px;font-weight:700;text-align:center;border:0.5px solid #e0e0e0;border-radius:1px;line-height:12px;overflow:hidden;min-width:0}
.bm{background:#f9fafb;color:#ccc}
.bo{background:#22c55e;color:#fff;border-color:#16a34a}
.bd{background:#f97316;color:#fff;border-color:#ea580c}
.pt-sp{border-color:transparent!important;background:transparent!important;color:transparent!important}
#pt-foot{font-size:8px;color:#bbb;text-align:center;margin-top:8px;padding-top:5px;border-top:1px solid #f0f0f0}
@media print{
  @page{size:A4 portrait;margin:6mm}
  header,nav,#pwScreen,#loadingOverlay,.pg-topbar{display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  main{max-width:100%!important;padding:0!important}
  #pt-wrap{border:none!important;padding:0!important;border-radius:0!important;background:#fff!important}
  .sec{display:none!important}
  #tab-print.sec{display:block!important}
  #pt-legend{margin-bottom:1mm;gap:3mm}
  .pt-litem{font-size:2mm;gap:1mm}
  .pt-gh{font-size:1.9mm;line-height:2.5mm;height:2.5mm;padding:0 1mm;margin:0.3mm 0 0.1mm;border-radius:0.5mm;letter-spacing:0.3mm}
  .pt-row{height:3.5mm;gap:0.2mm;margin-bottom:0.1mm}
  .pt-fl{width:4mm;font-size:3mm;line-height:3.5mm}
  .pt-cd{width:7.5mm;font-size:2.3mm;line-height:3.5mm}
  .pt-bx{height:3mm;font-size:1.8mm;line-height:3mm;border-width:0.2mm;border-radius:0.3mm}
  #pt-foot{font-size:1.6mm;margin-top:0.8mm;padding-top:0.3mm;border-top:0.2mm solid #eee}
}
/* Loading overlay */
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
#loadingOverlay{position:fixed;inset:0;background:#07071099;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:9999}
.load-box{background:linear-gradient(135deg,#0d1a30,#0a1020);border:1px solid #1a3a6a;border-radius:16px;padding:36px 48px;text-align:center;max-width:320px}
.load-ball{font-size:40px;animation:pulse 1.2s infinite;margin-bottom:14px}
.load-title{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
.load-sub{font-size:11px;color:#475569;margin-bottom:20px}
.load-bar{width:200px;height:4px;background:#0f1729;border-radius:2px;overflow:hidden;margin:0 auto}
.load-bar-inner{height:100%;width:40%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:2px;animation:shimmer 1.4s infinite}
.load-err{color:#f87171;font-size:12px;margin-top:12px;line-height:1.5}
/* Password screen */
#pwScreen{position:fixed;inset:0;background:#070710;display:flex;align-items:center;justify-content:center;z-index:99999}
.pw-box{background:linear-gradient(135deg,#0d1a30,#0a1020);border:1px solid #1a3a6a;border-radius:18px;padding:40px 44px;text-align:center;max-width:340px;width:90%}
.pw-ball{font-size:44px;margin-bottom:14px}
.pw-title{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.pw-sub{font-size:11px;color:#475569;margin-bottom:22px}

<script>
(function(){
  const SENHA='vida2205';
  if(sessionStorage.getItem('copa_ok')==='1'){
    document.getElementById('pwScreen').style.display='none';
  }
  window.checkPw=function(){
    const v=document.getElementById('pwInput').value;
    if(v===SENHA){

      document.getElementById('pwScreen').style.display='none';
    } else {
      const e=document.getElementById('pwErr');
      e.textContent='Senha incorreta. Tente novamente.';
      document.getElementById('pwInput').value='';
      document.getElementById('pwInput').focus();
      setTimeout(()=>e.textContent=' ',2500);
    }
  };
})();

  {g:"G",c:"#8b5cf6",ns:[{code:"BEL",name:"Bélgica",flag:"🇧🇪",abbr:"BEL"},{code:"EGY",name:"Egito",flag:"🇪🇬",abbr:"EGY"},{code:"IRN",name:"Irã",flag:"🇮🇷",abbr:"IRN"},{code:"NZL",name:"Nova Zelândia",flag:"🇳🇿",abbr:"NZL"}]},

const ANS=GRP.flatMap(g=>g.ns.map(n=>({...n,gl:g.g,gc:g.c})));
const FILTERS=[{k:'all',l:'Todas',c:'#94a3b8'},{k:'common',l:'Jogadores',c:'#3b82f6'},{k:'shield',l:'Escudos ✨',c:'#c9a227'},{k:'fwc',l:'FWC',c:'#c9a227'},{k:'cc',l:'Coca-Cola',c:'#e5383b'}];

// ── STATE ──────────────────────────────────────────────────────────────────────
function bld(){
  const fwc={};ALL_FWC.forEach(s=>{fwc[s.code]={owned:false,repeated:0}});
  const nations={};ANS.forEach(n=>{nations[n.code]={owned:Array(20).fill(false),repeated:Array(20).fill(0)}});
  const cc={};CC.forEach(s=>{cc[s.code]={owned:false,repeated:0}});
  return{fwc,nations,cc,panini00:{owned:false,repeated:0}};
}
let A=bld();

// ── GOOGLE SHEETS — carregar e salvar ──────────────────────────────────────────
let _pending={};
let _saveTimer=null;
let _saving=0;

// Salva uma figurinha na fila (debounced 600 ms)
function sv(codigo,owned,repeated){
  _pending[codigo]={owned,repeated};
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(_flush,600);
  _saving++;
  _showPill(true);
}

async function _flush(){
  const items=Object.entries(_pending);
  _pending={};
  for(const[codigo,d]of items){
    try{
      await fetch(`${SCRIPT_URL}?action=save&codigo=${encodeURIComponent("x"+codigo)}&owned=${d.owned}&repeated=${d.repeated}&_t=${Date.now()}`);
    }catch(e){console.warn('Erro ao salvar',codigo,e);}
  }
  _saving=Math.max(0,_saving-items.length);
  _showPill(_saving>0);
}

function _showPill(on){
  const el=document.getElementById('savePill');
  if(el)el.style.opacity=on?'1':'0';
}

// Carrega todos os dados do Sheets e popula o estado A
async function init(){
  const overlay=document.getElementById('loadingOverlay');
  const msg=document.getElementById('loadMsg');
  const errEl=document.getElementById('loadErr');

  // Valida URL configurada
  if(!SCRIPT_URL||SCRIPT_URL.includes('COLE_A_URL')){
    msg.textContent='⚠️ Configure a SCRIPT_URL no HTML!';
    errEl.style.display='block';
    errEl.innerHTML='Abra o arquivo HTML em um editor de texto e substitua <code>COLE_A_URL_DO_SEU_WEB_APP_AQUI</code> pela URL do seu Web App do Apps Script.';
    return;
  }

  try{
    msg.textContent='Conectando ao Google Sheets...';
    const res=await fetch(SCRIPT_URL+'?_t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const result=await res.json();
    if(!result.ok)throw new Error(result.error||'Resposta inválida');

    const _raw=result.data||{};
    // Remove prefixo 'x' — salvo como xMAR-01 para evitar conversão de data no Sheets
    const d={};
    Object.entries(_raw).forEach(([k,v])=>{ d[k.startsWith('x')?k.slice(1):k]=v; });

    // FWC
    ALL_FWC.forEach(s=>{
      if(d[s.code])A.fwc[s.code]={owned:!!d[s.code].owned,repeated:d[s.code].repeated||0};
    });
    // Seleções
    ANS.forEach(n=>{
      for(let i=0;i<20;i++){
        const code=n.code+'-'+p2(i+1);
        if(d[code]){A.nations[n.code].owned[i]=!!d[code].owned;A.nations[n.code].repeated[i]=d[code].repeated||0;}
      }
    });
    // Coca-Cola
    CC.forEach(s=>{
      if(d[s.code])A.cc[s.code]={owned:!!d[s.code].owned,repeated:d[s.code].repeated||0};
    });
    // Panini 00
    if(d['PANINI-00'])A.panini00={owned:!!d['PANINI-00'].owned,repeated:d['PANINI-00'].repeated||0};

    msg.textContent='Pronto! ✓';
    setTimeout(()=>{overlay.style.display='none';},400);

  }catch(e){
    console.error(e);
    msg.textContent='Erro ao conectar :(';
    errEl.style.display='block';
    errEl.textContent='Detalhes: '+e.message+'\n\nVerifique se a URL está correta e se o Web App está publicado como "Qualquer pessoa".';
    // Permite usar o app mesmo sem dados (offline mode)
    setTimeout(()=>{overlay.style.display='none';},3000);
  }

  uh();rDB();
}

function p2(n){return String(n).padStart(2,'0')}
function pct(a,b){return b?Math.round(a/b*100):0}
function gstats(){
  let fo=0,no=0,co=0,rep=0;
  ALL_FWC.forEach(s=>{if(A.fwc[s.code]?.owned)fo++;rep+=A.fwc[s.code]?.repeated||0});
  ANS.forEach(n=>{no+=A.nations[n.code].owned.filter(Boolean).length;A.nations[n.code].repeated.forEach(r=>rep+=r)});
  CC.forEach(s=>{if(A.cc[s.code]?.owned)co++;rep+=A.cc[s.code]?.repeated||0});
  const p00=A.panini00?.owned?1:0;
  return{fo,no,co,o980:p00+fo+no,rep};
}
function uh(){const st=gstats();document.getElementById('hO').textContent=st.o980;document.getElementById('hB').style.width=pct(st.o980,980)+'%';document.getElementById('hP').textContent=pct(st.o980,980)+'% completo';}

// NAV
const TABS=[['dashboard','📊 Dashboard'],['fwc','🏆 FWC'],['nations','🌍 Seleções'],['specials','✨ Especiais'],['trades','🔄 Trocas'],['print','🖨️ Imprimir']];
let curTab='dashboard';
document.getElementById('nav').innerHTML=TABS.map(([k,l])=>`<button class="tab${k==='dashboard'?' on':''}" onclick="showTab('${k}')">${l}</button>`).join('');
function showTab(t){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  const i=TABS.findIndex(x=>x[0]===t);
  document.querySelectorAll('.tab')[i]?.classList.add('on');
  curTab=t;
  const fn={dashboard:rDB,fwc:rFWC,nations:rNL,specials:rSP,trades:rTR,print:rPR};
  fn[t]?.();
}

  <div class="gg">${GRP.map(grp=>{
    let go=0;grp.ns.forEach(n=>{go+=A.nations[n.code].owned.filter(Boolean).length});

let trV='ofereco',trF='all';
function bOfereco(){
  const l=[];

  CC.forEach(s=>{const r=A.cc[s.code]?.repeated||0;if(r>0)l.push({label:`CC-${p2(s.num)}`,name:s.name,flag:s.flag,cnt:r,type:'cc',grp:'Coca-Cola'})});

function bPreciso(){

function applyTF(arr){

    if(q)return it.label.toLowerCase().includes(q.toLowerCase())||it.name.toLowerCase().includes(q.toLowerCase())||(it.grp||'').toLowerCase().includes(q.toLowerCase());

  <div class="trlh" style="margin-top:14px"><span style="color:var(--blue2);font-weight:700;font-size:14px">🔄 Suas repetidas para oferecer</span></div>
  <div style="font-size:12px;color:#64748b;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 13px">Você tem <strong style="color:var(--green)">${of.reduce((a,b)=>a+b.cnt,0)}</strong> repetidas. Use <strong>🟢 Ofereço</strong> + copiar para enviar sua lista.</div>
  ${recv.length>0?`<button class="trbcp" onclick="cpMatch(${JSON.stringify(recv)})">📋 Copiar proposta de troca</button>`:''}`;
}
function cpL(w){
  const of=bOfereco(),pr=bPreciso();const fO=applyTF(of),fP=applyTF(pr);
  const isF=trF!=='all'||((document.getElementById('trs')||{}).value||'').length>0;
  const fl=isF?` [${FILTERS.find(f=>f.k===trF)?.l}]`:'';
  const q=(document.getElementById('trs')||{}).value;const ql=q?` (busca: "${q}")`:'';
  const txt=w==='preciso'?`🔴 PRECISO${fl}${ql} — Copa 2026:\n`+fP.map(p=>p.label).join(', '):`🟢 TENHO PARA TROCAR${fl}${ql} — Copa 2026:\n`+fO.map(o=>o.label+(o.cnt>1?`(x${o.cnt})`:'')).join(', ');
  try{navigator.clipboard.writeText(txt)}catch{}
  const btn=document.getElementById(w==='preciso'?'cpr':'cof');
  if(btn){const orig=btn.textContent;btn.textContent='✓ Copiado!';setTimeout(()=>btn.textContent=orig,1800);}
}
function cpMatch(recv){
  const of=bOfereco();const txt='🤝 PROPOSTA DE TROCA — Copa 2026\n\nEu pego de você: '+recv.join(', ')+'\n\nTe ofereço: '+of.map(o=>o.label+(o.cnt>1?`(x${o.cnt})`:'')).join(', ');
  try{navigator.clipboard.writeText(txt)}catch{}
  event.target.textContent='✓ Copiado!';setTimeout(()=>event.target.textContent='📋 Copiar proposta de troca',1800);
}

// IMPRIMIR — grid compacto A4 retrato ─────────────────────────────────────
function rPR(){
  const today=new Date().toLocaleDateString('pt-BR');
  const q2=n=>String(n).padStart(2,'0');
  const sc=(owned,rep)=>rep>0?'bd':owned?'bo':'bm';

  // FWC row: PANINI-00 (=00) + FWC-01..19 = 20 caixinhas
  const fwcRow=`<div class="pt-row">
    <span class="pt-fl">🏆</span><span class="pt-cd">FWC</span>
    <span class="pt-bx ${sc(A.panini00.owned,A.panini00.repeated)}">00</span>
    ${ALL_FWC.map(s=>`<span class="pt-bx ${sc(A.fwc[s.code]?.owned,A.fwc[s.code]?.repeated||0)}">${q2(s.num)}</span>`).join('')}
  </div>`;

  // Linhas dos grupos (A-L)
  const grpRows=GRP.map(grp=>`<div><span class="pt-gh" style="background:${grp.c}22;color:${grp.c};border-left:2.5px solid ${grp.c}">GRUPO ${grp.g}</span></div>
    ${grp.ns.map(n=>`<div class="pt-row">
      <span class="pt-fl">${n.flag}</span><span class="pt-cd">${n.abbr}</span>
      ${Array.from({length:20},(_,i)=>`<span class="pt-bx ${sc(A.nations[n.code].owned[i],A.nations[n.code].repeated[i])}">${q2(i+1)}</span>`).join('')}
    </div>`).join('')}`).join('');

  // CC row: 14 caixinhas + 6 vazias para alinhar na grade de 20
  const ccRow=`<div class="pt-row">
    <span class="pt-fl">🥤</span><span class="pt-cd">CC</span>
    ${CC.map(s=>`<span class="pt-bx ${sc(A.cc[s.code]?.owned,A.cc[s.code]?.repeated||0)}">${q2(s.num)}</span>`).join('')}
    ${Array(6).fill('<span class="pt-bx pt-sp"></span>').join('')}
  </div>`;

  document.getElementById('tab-print').innerHTML=`
  <div class="pg-topbar">
    <div>
      <div style="font-size:14px;font-weight:700;color:var(--text)">🖨️ Tabela de Figurinhas — A4</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">
        1 página · <span style="color:#22c55e;font-weight:700">■</span> colada ·
        <span style="color:#f97316;font-weight:700">■</span> pra trocar ·
        <span style="color:#ccc;font-weight:700">■</span> falta
      </div>
    </div>
    <button class="pg-pbtn" onclick="window.print()">🖨️ Imprimir (A4)</button>
  </div>
  <div id="pt-wrap">
    <div id="pt-legend">
      <span class="pt-litem"><span class="pt-bx bm" style="width:16px;display:inline-block;vertical-align:middle">?</span> falta</span>
      <span class="pt-litem"><span class="pt-bx bo" style="width:16px;display:inline-block;vertical-align:middle">✓</span> colada no álbum</span>
      <span class="pt-litem"><span class="pt-bx bd" style="width:16px;display:inline-block;vertical-align:middle">+</span> tenho pra trocar</span>
      <span style="margin-left:auto;font-size:8px;color:#888">Nome: _________________________________ &nbsp; Data: ${today}</span>
    </div>
    ${fwcRow}${grpRows}${ccRow}
    <div id="pt-foot">⚽ Álbum Panini Copa do Mundo 2026™</div>
  </div>`;
}


// INIT — carrega do Google Sheets
init();
